<title>Nexo Empresarial — Em Manutenção</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0B2E6B 0%, #1351A3 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(11, 46, 107, 0.35);
  }
  .icon-wrap {
    width: 88px;
    height: 88px;
    background: #e4eaf5;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .icon-wrap svg {
    width: 44px;
    height: 44px;
    stroke: #1351A3;
    animation: spin 3s linear infinite;
    transform-origin: center;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  h1 {
    color: #111827;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  p {
    color: #6B7280;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff7ed;
    color: #D97706;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    margin-top: 20px;
  }
  .badge::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #D97706;
  }
  .brand {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #e5e7eb;
  }
  .brand img {
    height: 160px;
    width: auto;
    max-width: 100%;
  }
</style>
